<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CivicGuard Login Connected</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "monospace"],
                        "mono": ["Space Grotesk", "monospace"] 
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
</head>
<body class="bg-white dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<div class="w-full max-w-[420px] bg-white dark:bg-[#15202b] border border-[#dddddd] dark:border-slate-700 flex flex-col relative group/design-root">
<div class="h-1 w-full bg-[#137fec]"></div>
<div class="flex items-center justify-between px-6 py-2 border-b border-[#dddddd] dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
<span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">System Online</span>
</div>
<span class="text-[10px] uppercase tracking-widest text-slate-400">ID: 884-21A</span>
</div>
<div class="p-8 pb-6 flex flex-col gap-4">
<div class="flex flex-col gap-1">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tighter leading-tight uppercase">
                    Secure Access <span class="text-primary">v1.0</span>
</h1>
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">
                    CivicGuard Utility Interface
                </p>
</div>
<div class="w-12 h-12 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-900 dark:text-white" style="font-size: 24px;">shield_lock</span>
</div>
</div>
<form class="px-8 pb-8 flex flex-col gap-6">
<div class="flex flex-col gap-2 group">
<label class="flex items-center justify-between">
<span class="text-xs font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider">Government Email</span>
<span class="material-symbols-outlined text-[16px] text-slate-400 opacity-0 group-focus-within:opacity-100 transition-opacity">mail</span>
</label>
<div class="relative">
<input class="w-full bg-transparent border border-slate-900 dark:border-slate-400 rounded-none h-12 px-4 text-sm font-medium text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 focus:border-primary focus:bg-slate-50 dark:focus:bg-slate-800/50 transition-colors" placeholder="officer@city.gov" type="email"/>
<div class="absolute right-0 top-0 h-full w-1 bg-transparent group-focus-within:bg-primary transition-colors"></div>
</div>
</div>
<div class="flex flex-col gap-2 group">
<label class="flex items-center justify-between">
<span class="text-xs font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider">Access Key</span>
<span class="material-symbols-outlined text-[16px] text-slate-400 opacity-0 group-focus-within:opacity-100 transition-opacity">key</span>
</label>
<div class="relative">
<input class="w-full bg-transparent border border-slate-900 dark:border-slate-400 rounded-none h-12 px-4 text-sm font-medium text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 focus:border-primary focus:bg-slate-50 dark:focus:bg-slate-800/50 transition-colors" placeholder="••••••••••••" type="password"/>
<div class="absolute right-0 top-0 h-full w-1 bg-transparent group-focus-within:bg-primary transition-colors"></div>
</div>
</div>
<div class="pt-2 flex flex-col gap-4">
<button class="relative w-full h-12 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-none hover:bg-primary dark:hover:bg-primary hover:text-white dark:hover:text-white transition-all duration-200 flex items-center justify-center gap-2 group/btn" type="button">
<span class="text-sm font-bold tracking-widest uppercase">Authorize &amp; Enter Dashboard</span>
<span class="material-symbols-outlined text-[18px] group-hover/btn:translate-x-1 transition-transform">login</span>
</button>
<div class="flex items-center justify-between border-t border-dashed border-slate-300 dark:border-slate-700 pt-4 mt-2">
<a class="text-xs text-slate-500 dark:text-slate-400 hover:text-primary transition-colors uppercase tracking-wide" href="#">Lost Key?</a>
<a class="text-xs text-slate-500 dark:text-slate-400 hover:text-primary transition-colors uppercase tracking-wide" href="#">Contact IT</a>
</div>
</div>
</form>
<div class="bg-slate-100 dark:bg-slate-900/50 border-t border-[#dddddd] dark:border-slate-700 p-4 flex flex-col items-center gap-3">
<p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-widest flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[14px]">lock</span>
                Authorized Personnel Only
            </p>
<a class="flex items-center gap-2 text-[10px] text-slate-400 hover:text-slate-900 dark:hover:text-white uppercase tracking-widest transition-colors border-t border-slate-200 dark:border-slate-700 pt-3 w-full justify-center" href="#">
<span class="material-symbols-outlined text-[12px]">arrow_back</span>
                Return to Site
            </a>
</div>
<div class="absolute top-0 left-0 w-2 h-2 border-l-2 border-t-2 border-slate-900 dark:border-white -translate-x-[1px] -translate-y-[1px]"></div>
<div class="absolute top-0 right-0 w-2 h-2 border-r-2 border-t-2 border-slate-900 dark:border-white translate-x-[1px] -translate-y-[1px]"></div>
<div class="absolute bottom-0 left-0 w-2 h-2 border-l-2 border-b-2 border-slate-900 dark:border-white -translate-x-[1px] translate-y-[1px]"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-r-2 border-b-2 border-slate-900 dark:border-white translate-x-[1px] translate-y-[1px]"></div>
</div>
<div class="fixed inset-0 -z-10 pointer-events-none opacity-[0.03]" style="background-image: linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px); background-size: 20px 20px;"></div>
</body></html>
